services:
  postgres:
    image: postgres:17
    container_name: hotel-postgres
    restart : always

    environment:
      POSTGRES_USER : adib
      POSTGRES_PASSWORD : password
      POSTGRES_DB : hotel_booking

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    
volumes:
  postgres_data :